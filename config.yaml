# ============================================================
# network_backup — configuration file
# ============================================================

# ─── FTP Server ─────────────────────────────────────────────
ftp:
  host:      "192.168.1.2"       # FTP server IP or hostname
  port:      21                    # Default FTP port
  username:  "ftpuser"
  password:  "ftppassword"
  passive:   true                  # Use passive mode (recommended behind NAT/FW)
  base_dir:  "backups"             # Root folder on FTP server

# ─── Logging ────────────────────────────────────────────────
logging:
  file:  "./logs/backup.log"        # Log file path (created automatically)
  level: "INFO"                   # DEBUG | INFO | WARNING | ERROR

# ─── Zabbix Monitoring ──────────────────────────────────────
zabbix:
  # Path to the JSON status file read by Zabbix UserParameter
  status_file: "/var/tmp/network_backup_status.json"

# ─── Devices ────────────────────────────────────────────────
# Supported types: cisco_ios | cisco_nexus | fortigate
# Each device can override: port, timeout, read_delay

